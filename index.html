<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOONBROOKE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --link: #0000ee;
        }

        [data-theme="dark"] {
            --bg: #000000;
            --fg: #ffffff;
            --link: #58a6ff;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Roboto Condensed', sans-serif;
            margin: 0;
            padding: 20px;
            font-size: 16px;
            line-height: 1.4;
        }

        .wrapper {
            max-width: 60rem;
            margin: 0 auto;
        }

        header {
            border-bottom: 2px solid var(--fg);
            padding-bottom: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 24px;
            margin: 0;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .theme-btn {
            background: none;
            border: 1px solid var(--fg);
            color: var(--fg);
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            padding: 4px 8px;
            text-transform: uppercase;
        }

        .box {
            border: 1px solid var(--fg);
            padding: 15px;
            margin-top: 10px;
        }

        .item {
            display: flex;
            align-items: center;
            margin: 10px 0;
            text-decoration: none;
            color: var(--link);
            font-weight: 400;
        }

        .item:hover {
            text-decoration: underline;
        }

        .emoji {
            margin-right: 10px;
            text-decoration: none;
            display: inline-block;
        }

        footer {
            margin-top: 30px;
            border-top: 1px solid var(--fg);
            padding-top: 10px;
            font-size: 13px;
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <header>
            <h1>MOONBROOKE</h1>
            <button class="theme-btn" id="t">LIGHT/DARK</button>
        </header>

        <p>Hello! This is Moonbrooke. Here I'm going to share all the stuff that I've been working on.</p>
        <p>Site is still under construction! There are still nothing here. Please come back later!</p>

        <div class="box">
            <a href="https://www.youtube.com/@kizz1337" class="item" target="_blank">
                <span class="emoji">📺</span> YouTube
            </a>
            <a href="https://twitter.com/_moonbrooke" class="item" target="_blank">
                <span class="emoji">🐦</span> Twitter
            </a>
            <a href="https://github.com/moonbrooke" class="item" target="_blank">
                <span class="emoji">💻</span> GitHub
            </a>
        </div>

        <footer>
            <p>Malo periculosam libertatem quam quietum servitium.</p>
        </footer>
    </div>

    <script>
        const b = document.getElementById('t');
        const h = document.documentElement;

        if (localStorage.getItem('theme') === 'dark') h.setAttribute('data-theme', 'dark');

        b.onclick = () => {
            const isDark = h.getAttribute('data-theme') === 'dark';
            if (isDark) {
                h.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                h.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        };
    </script>
</body>

</html>
